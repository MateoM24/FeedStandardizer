spring.application.name=feed-standardizer
server.port=8080

# Structured logging for cleaner output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.app.name=Feed Standardizer
management.info.app.description=Normalizes provider-specific feed messages into a unified internal format

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
